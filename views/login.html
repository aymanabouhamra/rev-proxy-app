<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a0f;
      --surface: #0e1117;
      --border: #1e2330;
      --border-hover: #2e3a52;
      --text: #e8eaf0;
      --text-muted: #5a6278;
      --accent: #4f8ef7;
      --accent-dim: rgba(79, 142, 247, 0.12);
      --accent-glow: rgba(79, 142, 247, 0.25);
      --error-bg: rgba(239, 68, 68, 0.08);
      --error-border: rgba(239, 68, 68, 0.3);
      --error-text: #f87171;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Mono', monospace;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 142, 247, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 142, 247, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 142, 247, 0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease both;
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 1px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      margin-bottom: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: var(--accent-dim);
      border: 1px solid rgba(79, 142, 247, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 16px;
      height: 16px;
      color: var(--accent);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .error-box {
      display: none;
      align-items: center;
      gap: 0.6rem;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 7px;
      padding: 0.7rem 0.9rem;
      margin-bottom: 1.25rem;
      font-size: 0.78rem;
      color: var(--error-text);
      letter-spacing: 0.01em;
    }

    .error-box.visible {
      display: flex;
      animation: fadeUp 0.25s ease both;
    }

    .error-box svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.7rem 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: #2e3a52;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.8rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.18s ease, transform 0.12s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    button[type="submit"]::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
    }

    button[type="submit"]:hover {
      opacity: 0.9;
      box-shadow: 0 0 24px var(--accent-glow);
      transform: translateY(-1px);
    }

    button[type="submit"]:active {
      transform: translateY(0);
      opacity: 1;
    }

    .footer-note {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .footer-note span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 0.4rem;
      vertical-align: middle;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="logo-text">Proxy Gateway</span>
      </div>
      <h1 class="title">Welcome back</h1>
      <p class="subtitle">Enter your credentials to continue</p>
    </div>

    <div id="error" class="error-box" role="alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Invalid username or password. Please try again.
    </div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          name="username"
          placeholder="your_username"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          placeholder="••••••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit">Sign In</button>
    </form>

    <p class="footer-note"><span></span>Secure connection established</p>
  </div>

  <script>
    if (new URLSearchParams(window.location.search).get('error')) {
      document.getElementById('error').classList.add('visible');
    }
  </script>
</body>
</html>
